version: "3.8"

services:
  mysql-db:
    image: mysql:8.0
    container_name: polls-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: realtime_polls
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis-cache:
    image: redis:latest
    container_name: polls-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mysql_data:
